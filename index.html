<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySQL Source Code Analyzer</title>
    <script type="module" crossorigin src="./assets/index-0YrtlX9V.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-kJVcL9mh.css">
    <style>
      /* 强制修改密码弹窗样式 */
      #force-change-pwd-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
      }
      #force-change-pwd-overlay.active {
        display: flex;
      }
      #force-change-pwd-box {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #force-change-pwd-box h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #f8fafc;
        margin: 0 0 8px 0;
      }
      #force-change-pwd-box p {
        font-size: 0.875rem;
        color: #94a3b8;
        margin: 0 0 24px 0;
        line-height: 1.5;
      }
      #force-change-pwd-box .warning-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(245,158,11,0.15);
        border: 1px solid rgba(245,158,11,0.3);
        color: #fbbf24;
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      #force-change-pwd-box label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 6px;
      }
      #force-change-pwd-box input {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 14px;
        color: #f1f5f9;
        font-size: 0.9375rem;
        outline: none;
        box-sizing: border-box;
        margin-bottom: 16px;
        transition: border-color 0.2s;
      }
      #force-change-pwd-box input:focus {
        border-color: #3b82f6;
      }
      #force-change-pwd-box .error-msg {
        font-size: 0.8125rem;
        color: #f87171;
        margin: -8px 0 12px 0;
        min-height: 18px;
      }
      #force-change-pwd-box button {
        width: 100%;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 11px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      #force-change-pwd-box button:hover {
        background: #2563eb;
      }
      #force-change-pwd-box button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- 强制修改密码弹窗 -->
    <div id="force-change-pwd-overlay">
      <div id="force-change-pwd-box">
        <div class="warning-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          首次登录安全提示
        </div>
        <h2>请修改默认密码</h2>
        <p>检测到您正在使用系统默认密码登录管理员账号，为保障系统安全，请立即设置新密码后方可继续使用。</p>
        <label for="fcp-new">新密码</label>
        <input type="password" id="fcp-new" placeholder="请输入新密码（至少 8 位）" autocomplete="new-password" />
        <label for="fcp-confirm">确认新密码</label>
        <input type="password" id="fcp-confirm" placeholder="请再次输入新密码" autocomplete="new-password" />
        <div class="error-msg" id="fcp-error"></div>
        <button id="fcp-submit">确认修改密码</button>
      </div>
    </div>

    <script>
    (function() {
      'use strict';

      // localStorage key 常量（与应用保持一致）
      var KEYS = {
        users:       'mysql_analyzer_users',
        passwords:   'mysql_analyzer_passwords',
        currentUser: 'mysql_analyzer_current_user'
      };

      // 默认管理员账号
      var DEFAULT_ADMIN_USERNAME = '';
      var DEFAULT_ADMIN_PASSWORD = '';

      // 密码哈希函数（与应用 jl() 保持一致）
      function hashPassword(r) {
        var c = 0;
        for (var i = 0; i < r.length; i++) {
          var o = r.charCodeAt(i);
          c = Math.imul(c, 32) - c + o;
          c = c | 0; // 转为 32 位整数
        }
        return 'h_' + Math.abs(c).toString(36) + '_' + r.length;
      }

      // 检查是否需要强制修改密码
      function shouldForceChange() {
        try {
          var cu = localStorage.getItem(KEYS.currentUser);
          if (!cu) return false;
          var user = JSON.parse(cu);
          if (!user || user.username !== DEFAULT_ADMIN_USERNAME) return false;

          // 检查密码是否仍为默认密码
          var pwdStore = localStorage.getItem(KEYS.passwords);
          if (!pwdStore) return false;
          var pwds = JSON.parse(pwdStore);
          var defaultHash = hashPassword(DEFAULT_ADMIN_PASSWORD);
          return pwds[DEFAULT_ADMIN_USERNAME] === defaultHash;
        } catch(e) {
          return false;
        }
      }

      // 显示强制修改密码弹窗
      function showForceChangePwd() {
        var overlay = document.getElementById('force-change-pwd-overlay');
        if (overlay) {
          overlay.classList.add('active');
          var input = document.getElementById('fcp-new');
          if (input) setTimeout(function(){ input.focus(); }, 100);
        }
      }

      // 隐藏弹窗
      function hideForceChangePwd() {
        var overlay = document.getElementById('force-change-pwd-overlay');
        if (overlay) overlay.classList.remove('active');
      }

      // 执行密码修改
      function doChangePassword(newPwd) {
        try {
          var pwdStore = localStorage.getItem(KEYS.passwords);
          var pwds = pwdStore ? JSON.parse(pwdStore) : {};
          pwds[DEFAULT_ADMIN_USERNAME] = hashPassword(newPwd);
          localStorage.setItem(KEYS.passwords, JSON.stringify(pwds));
          return true;
        } catch(e) {
          return false;
        }
      }

      // 拦截 localStorage.setItem，监听登录事件
      var _origSetItem = localStorage.setItem.bind(localStorage);
      localStorage.setItem = function(key, value) {
        _origSetItem(key, value);
        // 当 currentUser 被写入时，检查是否需要强制改密
        if (key === KEYS.currentUser) {
          setTimeout(function() {
            if (shouldForceChange()) {
              showForceChangePwd();
            }
          }, 300);
        }
      };

      // 页面加载时也检查一次（处理刷新后仍登录的情况）
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          if (shouldForceChange()) {
            showForceChangePwd();
          }
        }, 800);
      });

      // 提交按钮事件
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('fcp-submit');
        var errEl = document.getElementById('fcp-error');
        if (!btn) return;

        btn.addEventListener('click', function() {
          var newPwd = document.getElementById('fcp-new').value;
          var confirmPwd = document.getElementById('fcp-confirm').value;
          errEl.textContent = '';

          if (!newPwd || newPwd.length < 8) {
            errEl.textContent = '密码长度不能少于 8 位';
            return;
          }
          if (newPwd === DEFAULT_ADMIN_PASSWORD) {
            errEl.textContent = '新密码不能与默认密码相同';
            return;
          }
          if (newPwd !== confirmPwd) {
            errEl.textContent = '两次输入的密码不一致';
            return;
          }

          btn.disabled = true;
          btn.textContent = '修改中...';

          if (doChangePassword(newPwd)) {
            btn.textContent = '修改成功！';
            setTimeout(function() {
              hideForceChangePwd();
              btn.disabled = false;
              btn.textContent = '确认修改密码';
              document.getElementById('fcp-new').value = '';
              document.getElementById('fcp-confirm').value = '';
            }, 800);
          } else {
            errEl.textContent = '密码修改失败，请刷新页面重试';
            btn.disabled = false;
            btn.textContent = '确认修改密码';
          }
        });

        // 回车键提交
        ['fcp-new', 'fcp-confirm'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') btn.click();
          });
        });
      });
    })();
    </script>
  </body>
</html>
